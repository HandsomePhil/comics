<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phil's TPB Comic Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700&family=Roboto:wght@400;500;600&family=Roboto+Flex:opsz,wght@8..144,900&display=swap">
<link rel="stylesheet" href="styles.css?v=24">
</head>
<body>
<main>
  <svg class="logo" viewBox="0 0 160 112" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Phil's TPB Collection logo">
    <!-- neon sign: fanned stack of outlined trade paperbacks -->
    <g class="neon neon-yellow flicker">
      <rect x="39" y="34" width="34" height="52" rx="4" fill="none" stroke="#FCC00E" stroke-width="4" transform="rotate(-18 56 60)"/>
    </g>
    <g class="neon neon-green">
      <rect x="87" y="34" width="34" height="52" rx="4" fill="none" stroke="#6BD636" stroke-width="4" transform="rotate(18 104 60)"/>
    </g>
    <!-- masks the back-book tubes behind the front book for depth -->
    <rect x="58" y="22" width="46" height="68" rx="4" fill="#080f1f"/>
    <g class="neon neon-blue">
      <rect x="58" y="22" width="46" height="68" rx="4" fill="none" stroke="#859FDA" stroke-width="4"/>
    </g>
    <g class="neon neon-orange">
      <circle cx="81" cy="56" r="15" fill="none" stroke="#F36A26" stroke-width="3"/>
      <path d="M84 47l-9 11h5l-3 10 10-12h-5l4-9z" fill="none" stroke="#F36A26" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
  </svg>
  <h1>Phil's Comics</h1>
  <div id="search-sentinel"></div>
  <div class="search-bar">
    <div class="search-wrapper">
      <input id="search" type="search" placeholder="Search the collection">
      <button id="clear-search" type="button" aria-label="Clear search">×</button>
    </div>
  </div>
  <table>
    <thead>
      <tr>
        <th class="sortable" data-sort="title">Title<span class="arrow"></span></th>
        <th class="vol sortable" data-sort="volume">Vol<span class="arrow"></span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="count"></div>
  <nav id="pagination" class="pagination" hidden></nav>
</main>
<script src="app.js?v=11" defer></script>
</body>
</html>
