<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comic Collection</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="header-row">
    <h1>Phil's TPB Collection</h1>
    <div id="count"></div>
  </div>
  <input id="search" type="search" placeholder="Search by title, volume, or publisher..." autofocus>
</header>
<main>
  <table>
    <thead>
      <tr>
        <th class="sortable" data-sort="title">Title<span class="arrow"></span></th>
        <th class="vol sortable" data-sort="volume">Vol<span class="arrow"></span></th>
        <th class="issues sortable" data-sort="issues">Issues<span class="arrow"></span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>
<div id="modal" class="modal" hidden>
  <img id="modal-img" alt="">
</div>
<script src="app.js" defer></script>
</body>
</html>
