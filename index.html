<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phil's TPB Comic Collection</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
  <h1>Phil's TPB Collection</h1>
  <div id="count"></div>
  <table>
    <thead>
      <tr>
        <th class="sortable" data-sort="title">Title<span class="arrow"></span></th>
        <th class="vol sortable" data-sort="volume">Vol<span class="arrow"></span></th>
        <th class="issues sortable" data-sort="issues">Issues<span class="arrow"></span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>
<footer class="search-footer">
  <div class="search-wrapper">
    <input id="search" type="search" placeholder="Search the collection" autofocus>
    <button id="clear-search" type="button" aria-label="Clear search">×</button>
  </div>
</footer>
<div id="modal" class="modal" hidden>
  <img id="modal-img" alt="">
</div>
<script src="app.js" defer></script>
</body>
</html>
