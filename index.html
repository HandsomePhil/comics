<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phil's TPB Comic Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700&family=Roboto:wght@400;500;600&display=swap">
<link rel="stylesheet" href="styles.css?v=9">
</head>
<body>
<h1 class="title-desktop">Phil's TPB Collection</h1>
<main>
  <h1 class="title-mobile">Phil's TPB Collection</h1>
  <table>
    <thead>
      <tr>
        <th class="sortable" data-sort="title">Title<span class="arrow"></span></th>
        <th class="vol sortable" data-sort="volume">Vol<span class="arrow"></span></th>
        <th class="issues sortable" data-sort="issues">Issues<span class="arrow"></span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <nav id="pagination" class="pagination" hidden></nav>
  <div id="count"></div>
</main>
<footer class="search-footer">
  <div class="search-wrapper">
    <input id="search" type="search" placeholder="Search the collection" autofocus>
    <button id="clear-search" type="button" aria-label="Clear search">×</button>
  </div>
</footer>
<div id="modal" class="modal" hidden>
  <img id="modal-img" alt="">
</div>
<script src="app.js?v=6" defer></script>
</body>
</html>
